name: UIT Healthcare DevSecOps Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NODE_VERSION: "20"
  REGISTRY: ghcr.io
  IMAGE_OWNER: hutusnov
  BACKEND_IMAGE_NAME: healthcare-backend
  OCR_IMAGE_NAME: healthcare-ocr

jobs:
  sast-scan:
    name: SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit (Backend)
        working-directory: BACK-END/PROJECT-TEST
        run: npm audit --audit-level=high --omit=dev || true

      - name: npm audit (Patient Portal)
        working-directory: BACK-END/PROJECT-TEST/patient-portal
        run: npm audit --audit-level=high --omit=dev || true

      - name: Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

  backend-build:
    name: Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACK-END/PROJECT-TEST
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: BACK-END/PROJECT-TEST/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Syntax check
        run: node -c src/app.js && node -c src/server.js

  patient-portal-build:
    name: Build Patient Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACK-END/PROJECT-TEST/patient-portal
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: BACK-END/PROJECT-TEST/patient-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_OCR_URL: ${{ secrets.VITE_OCR_URL }}
          VITE_OCR_API_KEY: ${{ secrets.VITE_OCR_API_KEY }}

  docker-security:
    name: Docker Build Push and Trivy Scan
    runs-on: ubuntu-latest
    needs: [sast-scan, backend-build]
    if: github.event_name == 'push'
    permissions:
      contents: read
      packages: write
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=main-latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=develop-latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }} \
            ./BACK-END/PROJECT-TEST

      - name: Build OCR image
        run: |
          docker build \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.OCR_IMAGE_NAME }}:${{ steps.meta.outputs.tag }} \
            -t ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.OCR_IMAGE_NAME }}:${{ github.sha }} \
            ./OCR

      - name: Push Backend image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ github.sha }}

      - name: Push OCR image
        run: |
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.OCR_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
          docker push ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.OCR_IMAGE_NAME }}:${{ github.sha }}

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Trivy Scan Backend API
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format table ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}

      - name: Trivy Scan OCR Service
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format table ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.OCR_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}

      - name: Trivy Filesystem Scan
        run: trivy fs --severity HIGH,CRITICAL --exit-code 0 --format table .

      - name: Trivy SARIF Backend
        run: trivy image --format sarif --output trivy-backend.sarif ${{ env.REGISTRY }}/${{ env.IMAGE_OWNER }}/${{ env.BACKEND_IMAGE_NAME }}:${{ steps.meta.outputs.tag }}
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
        continue-on-error: true

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [docker-security, patient-portal-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Deploy placeholder
        run: echo "Deployment stage ready - connect GHCR images to K3s rollout"
