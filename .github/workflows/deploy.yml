name: UIT Healthcare — DevSecOps Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '20'

jobs:
  # ============================================================
  # Stage 1: SAST — Static Application Security Testing
  # ============================================================
  sast-scan:
    name: 🔍 SAST Scan
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      # npm audit — dependency vulnerability scan
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit (Backend)
        working-directory: BACK-END/PROJECT-TEST
        run: npm audit --audit-level=high --omit=dev || true

      - name: npm audit (Patient Portal)
        working-directory: BACK-END/PROJECT-TEST/patient-portal
        run: npm audit --audit-level=high --omit=dev || true

      # Semgrep — SAST for code patterns
      - name: Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}
        continue-on-error: true

  # ============================================================
  # Stage 2: BUILD — Compile and Lint
  # ============================================================
  backend-build:
    name: 🔨 Build Backend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACK-END/PROJECT-TEST
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: BACK-END/PROJECT-TEST/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Syntax check
        run: node -c src/app.js && node -c src/server.js

  patient-portal-build:
    name: 🔨 Build Patient Portal
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACK-END/PROJECT-TEST/patient-portal
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: BACK-END/PROJECT-TEST/patient-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_OCR_URL: ${{ secrets.VITE_OCR_URL }}
          VITE_OCR_API_KEY: ${{ secrets.VITE_OCR_API_KEY }}

  # ============================================================
  # Stage 3: DOCKER BUILD + IMAGE SCANNING (Trivy)
  # ============================================================
  docker-security:
    name: 🐳 Docker Build & Trivy Scan
    runs-on: ubuntu-latest
    needs: [sast-scan, backend-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      security-events: write

    steps:
      - uses: actions/checkout@v4

      # Build Docker images
      - name: Build Backend image
        run: docker build -t uit-healthcare-api:latest ./BACK-END/PROJECT-TEST

      - name: Build OCR image
        run: docker build -t uit-healthcare-ocr:latest ./OCR

      # Trivy — scan Docker images for CVEs
      - name: Install Trivy
        run: |
          sudo apt-get install -y wget
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Trivy Scan — Backend API
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format table uit-healthcare-api:latest

      - name: Trivy Scan — OCR Service
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format table uit-healthcare-ocr:latest

      # Filesystem scan (for secrets, misconfigurations)
      - name: Trivy Filesystem Scan
        run: trivy fs --severity HIGH,CRITICAL --exit-code 0 --format table .

      # Upload SARIF for GitHub Security tab (optional)
      - name: Trivy SARIF — Backend
        run: trivy image --format sarif --output trivy-backend.sarif uit-healthcare-api:latest
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
        continue-on-error: true

  # ============================================================
  # Stage 4: DEPLOY (configure per platform)
  # ============================================================
  deploy:
    name: 🚀 Deploy
    runs-on: ubuntu-latest
    needs: [docker-security, patient-portal-build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production

    steps:
      - uses: actions/checkout@v4

      # ---- DigitalOcean Deployment ----
