      #     docker tag uit-healthcare-api:latest registry.digitalocean.com/${{ secrets.DO_REGISTRY }}/api:latest
      #     docker push registry.digitalocean.com/${{ secrets.DO_REGISTRY }}/api:${{ github.sha }}
