name: UIT Healthcare Hybrid Delivery Pipeline

on:
  push:
    branches: [main, develop]
    paths-ignore:
      - "deploy/gitops/**"
      - "deploy/argocd/**"
  pull_request:
    branches: [main, develop]
    paths-ignore:
      - "deploy/gitops/**"
      - "deploy/argocd/**"

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.10"
  REGISTRY_PROVIDER: ${{ vars.REGISTRY_PROVIDER }}
  AWS_REGION: ${{ vars.AWS_REGION }}
  AWS_BACKEND_INSTANCE_ID: ${{ vars.AWS_BACKEND_INSTANCE_ID }}
  ENABLE_AWS_EC2_DEPLOY: ${{ vars.ENABLE_AWS_EC2_DEPLOY }}
  BACKEND_IMAGE_NAME: healthcare-backend
  OCR_IMAGE_NAME: healthcare-ocr

jobs:
  sast-scan:
    name: SAST Scan
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    permissions:
      security-events: write
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: npm audit (Backend)
        working-directory: BACK-END/PROJECT-TEST
        run: npm audit --audit-level=high --omit=dev || true

      - name: npm audit (Patient Portal)
        working-directory: BACK-END/PROJECT-TEST/patient-portal
        run: npm audit --audit-level=high --omit=dev || true

      - name: Semgrep SAST Scan
        uses: semgrep/semgrep-action@v1
        with:
          config: >-
            p/javascript
            p/nodejs
            p/owasp-top-ten
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

  backend-validate:
    name: Validate Backend
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACK-END/PROJECT-TEST
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: BACK-END/PROJECT-TEST/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Syntax check
        run: node -c src/app.js && node -c src/server.js

      - name: Run backend tests if implemented
        shell: bash
        run: |
          if node -e "const pkg=require('./package.json'); process.exit(pkg.scripts.test && !pkg.scripts.test.includes('no test specified') ? 0 : 1)"; then
            npm test
          else
            echo "Skipping backend tests: no real test suite configured yet"
          fi

  patient-portal-validate:
    name: Validate Patient Portal
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: BACK-END/PROJECT-TEST/patient-portal
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: BACK-END/PROJECT-TEST/patient-portal/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: ${{ secrets.VITE_API_URL }}
          VITE_OCR_URL: ${{ secrets.VITE_OCR_URL }}
          VITE_OCR_API_KEY: ${{ secrets.VITE_OCR_API_KEY }}

  ocr-validate:
    name: Validate OCR Service
    if: github.event_name != 'push' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: OCR
    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: OCR/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Python syntax check
        run: python -m py_compile main.py ocr_services.py util.py

  docker-security:
    name: Build, Publish, and Scan Images
    runs-on: ubuntu-latest
    needs: [sast-scan, backend-validate, patient-portal-validate, ocr-validate]
    if: github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: read
      packages: write
      security-events: write
      id-token: write
    outputs:
      backend_image: ${{ steps.registry.outputs.backend_image }}
      ocr_image: ${{ steps.registry.outputs.ocr_image }}
      image_tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        shell: bash
        run: |
          if [ "${GITHUB_REF_NAME}" = "main" ]; then
            echo "tag=main-latest" >> "$GITHUB_OUTPUT"
          else
            echo "tag=develop-latest" >> "$GITHUB_OUTPUT"
          fi

      - name: Resolve registry target
        id: registry
        shell: bash
        env:
          AWS_ACCOUNT_ID: ${{ secrets.AWS_ACCOUNT_ID }}
        run: |
          provider="${REGISTRY_PROVIDER}"
          region="${AWS_REGION}"
          owner="$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')"

          if [ -z "$provider" ]; then
            provider="ghcr"
          fi

          if [ -z "$region" ]; then
            region="ap-southeast-1"
          fi

          if [ "$provider" = "ecr" ]; then
            if [ -z "$AWS_ACCOUNT_ID" ]; then
              echo "AWS_ACCOUNT_ID secret is required when REGISTRY_PROVIDER=ecr" >&2
              exit 1
            fi
            registry="${AWS_ACCOUNT_ID}.dkr.ecr.${region}.amazonaws.com"
            backend_image="${registry}/${BACKEND_IMAGE_NAME}"
            ocr_image="${registry}/${OCR_IMAGE_NAME}"
          else
            registry="ghcr.io"
            backend_image="${registry}/${owner}/${BACKEND_IMAGE_NAME}"
            ocr_image="${registry}/${owner}/${OCR_IMAGE_NAME}"
          fi

          echo "provider=${provider}" >> "$GITHUB_OUTPUT"
          echo "aws_region=${region}" >> "$GITHUB_OUTPUT"
          echo "registry=${registry}" >> "$GITHUB_OUTPUT"
          echo "backend_image=${backend_image}" >> "$GITHUB_OUTPUT"
          echo "ocr_image=${ocr_image}" >> "$GITHUB_OUTPUT"

      - name: Configure AWS credentials
        if: steps.registry.outputs.provider == 'ecr'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ steps.registry.outputs.aws_region }}

      - name: Login to ECR
        if: steps.registry.outputs.provider == 'ecr'
        uses: aws-actions/amazon-ecr-login@v2

      - name: Login to GHCR
        if: steps.registry.outputs.provider != 'ecr'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build Backend image
        run: |
          docker build \
            -t ${{ steps.registry.outputs.backend_image }}:${{ steps.meta.outputs.tag }} \
            -t ${{ steps.registry.outputs.backend_image }}:${{ github.sha }} \
            ./BACK-END/PROJECT-TEST

      - name: Build OCR image
        run: |
          docker build \
            -t ${{ steps.registry.outputs.ocr_image }}:${{ steps.meta.outputs.tag }} \
            -t ${{ steps.registry.outputs.ocr_image }}:${{ github.sha }} \
            ./OCR

      - name: Push Backend image
        run: |
          docker push ${{ steps.registry.outputs.backend_image }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.registry.outputs.backend_image }}:${{ github.sha }}

      - name: Push OCR image
        run: |
          docker push ${{ steps.registry.outputs.ocr_image }}:${{ steps.meta.outputs.tag }}
          docker push ${{ steps.registry.outputs.ocr_image }}:${{ github.sha }}

      - name: Install Trivy
        run: |
          sudo apt-get install -y wget
          wget -qO - https://aquasecurity.github.io/trivy-repo/deb/public.key | gpg --dearmor | sudo tee /usr/share/keyrings/trivy.gpg > /dev/null
          echo "deb [signed-by=/usr/share/keyrings/trivy.gpg] https://aquasecurity.github.io/trivy-repo/deb generic main" | sudo tee /etc/apt/sources.list.d/trivy.list
          sudo apt-get update && sudo apt-get install -y trivy

      - name: Trivy Scan Backend API
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format table ${{ steps.registry.outputs.backend_image }}:${{ steps.meta.outputs.tag }}

      - name: Trivy Scan OCR Service
        run: trivy image --severity HIGH,CRITICAL --exit-code 0 --format table ${{ steps.registry.outputs.ocr_image }}:${{ steps.meta.outputs.tag }}

      - name: Trivy Filesystem Scan
        run: trivy fs --severity HIGH,CRITICAL --exit-code 0 --format table .

      - name: Trivy SARIF Backend
        run: trivy image --format sarif --output trivy-backend.sarif ${{ steps.registry.outputs.backend_image }}:${{ steps.meta.outputs.tag }}
        continue-on-error: true

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-backend.sarif
        continue-on-error: true

  gitops-update:
    name: Update GitOps Manifests
    runs-on: ubuntu-latest
    needs: [docker-security]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push' && !contains(github.event.head_commit.message, '[skip ci]')
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Update ArgoCD repo URL
        shell: bash
        run: |
          repo_url="https://github.com/${GITHUB_REPOSITORY}.git"
          sed -i "s|https://github.com/REPLACE_ME/healthcare.git|${repo_url}|g" deploy/argocd/*.yaml

      - name: Update image references
        shell: bash
        env:
          BACKEND_IMAGE: ${{ needs.docker-security.outputs.backend_image }}
          OCR_IMAGE: ${{ needs.docker-security.outputs.ocr_image }}
          IMAGE_TAG: ${{ github.sha }}
        run: |
          sed -i "s|newName: .*|newName: ${BACKEND_IMAGE}|g" deploy/gitops/apps/aws-backend/overlays/prod/kustomization.yaml
          sed -i "s|newTag: .*|newTag: ${IMAGE_TAG}|g" deploy/gitops/apps/aws-backend/overlays/prod/kustomization.yaml
          sed -i "s|newName: .*|newName: ${OCR_IMAGE}|g" deploy/gitops/apps/private-ocr/overlays/prod/kustomization.yaml
          sed -i "s|newTag: .*|newTag: ${IMAGE_TAG}|g" deploy/gitops/apps/private-ocr/overlays/prod/kustomization.yaml

      - name: Commit GitOps updates
        shell: bash
        run: |
          if git diff --quiet; then
            echo "No GitOps changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/gitops deploy/argocd
          git commit -m "[skip ci] gitops: update deploy image tags"
          git push

  deploy-aws-ec2:
    name: Deploy AWS EC2 Backend
    runs-on: ubuntu-latest
    needs: [docker-security]
    if: github.event_name == 'push' && vars.ENABLE_AWS_EC2_DEPLOY == 'true' && vars.AWS_BACKEND_INSTANCE_ID != '' && !contains(github.event.head_commit.message, '[skip ci]')
    steps:
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ vars.AWS_REGION }}

      - name: Deploy backend over SSM
        shell: bash
        env:
          INSTANCE_ID: ${{ env.AWS_BACKEND_INSTANCE_ID }}
          BACKEND_IMAGE: ${{ needs.docker-security.outputs.backend_image }}:${{ needs.docker-security.outputs.image_tag }}
          GHCR_USERNAME: ${{ secrets.GHCR_DEPLOY_USERNAME }}
          GHCR_TOKEN: ${{ secrets.GHCR_DEPLOY_TOKEN }}
          DATABASE_URL: ${{ secrets.BACKEND_DATABASE_URL }}
          JWT_SECRET: ${{ secrets.BACKEND_JWT_SECRET }}
          FRONTEND_URL: ${{ secrets.BACKEND_FRONTEND_URL }}
          ADMIN_PANEL_URL: ${{ secrets.BACKEND_ADMIN_PANEL_URL }}
          PATIENT_PORTAL_URL: ${{ secrets.BACKEND_PATIENT_PORTAL_URL }}
          MOMO_PARTNER_CODE: ${{ secrets.MOMO_PARTNER_CODE }}
          MOMO_NOTIFY_URL: ${{ secrets.MOMO_NOTIFY_URL }}
          MOMO_ACCESS_KEY: ${{ secrets.MOMO_ACCESS_KEY }}
          MOMO_SECRET_KEY: ${{ secrets.MOMO_SECRET_KEY }}
          MOMO_ENDPOINT: ${{ secrets.MOMO_ENDPOINT }}
          MOMO_RETURN_URL: ${{ secrets.MOMO_RETURN_URL }}
        run: |
          python - <<'PY'
          import json
          import os
          from pathlib import Path

          compose = f"""services:
            backend:
              image: {os.environ["BACKEND_IMAGE"]}
              container_name: healthcare-backend
              restart: unless-stopped
              env_file:
                - .env
              ports:
                - "4000:4000"
              healthcheck:
                test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/health || exit 1"]
                interval: 30s
                timeout: 5s
                retries: 3
                start_period: 15s
          """

          env_file = f"""BACKEND_IMAGE={os.environ["BACKEND_IMAGE"]}
          NODE_ENV=production
          PORT=4000
          DATABASE_URL={os.environ["DATABASE_URL"]}
          JWT_SECRET={os.environ["JWT_SECRET"]}
          PATIENT_PORTAL_URL={os.environ["PATIENT_PORTAL_URL"]}
          ADMIN_PANEL_URL={os.environ["ADMIN_PANEL_URL"]}
          FRONTEND_URL={os.environ["FRONTEND_URL"]}
          MOMO_PARTNER_CODE={os.environ["MOMO_PARTNER_CODE"]}
          MOMO_NOTIFY_URL={os.environ["MOMO_NOTIFY_URL"]}
          MOMO_ACCESS_KEY={os.environ["MOMO_ACCESS_KEY"]}
          MOMO_SECRET_KEY={os.environ["MOMO_SECRET_KEY"]}
          MOMO_ENDPOINT={os.environ["MOMO_ENDPOINT"]}
          MOMO_RETURN_URL={os.environ["MOMO_RETURN_URL"]}
          """

          ghcr_username = os.environ.get("GHCR_USERNAME", "")
          ghcr_token = os.environ.get("GHCR_TOKEN", "")

          commands = [
              "set -e",
              "sudo mkdir -p /opt/healthcare-backend",
              "cat > /opt/healthcare-backend/docker-compose.yml <<'EOF'\n" + compose + "\nEOF",
              "cat > /opt/healthcare-backend/.env <<'EOF'\n" + env_file + "\nEOF",
          ]

          if ghcr_username and ghcr_token:
              commands.append(
                  f"echo {json.dumps(ghcr_token)} | sudo docker login ghcr.io -u {json.dumps(ghcr_username)} --password-stdin"
              )

          commands.extend([
              "sudo docker rm -f healthcare-backend || true",
              "cd /opt/healthcare-backend && sudo docker compose down --remove-orphans || true",
              "cd /opt/healthcare-backend && sudo docker compose pull",
              "cd /opt/healthcare-backend && sudo docker compose up -d",
              "sudo docker ps --filter name=healthcare-backend",
              "for i in $(seq 1 20); do curl -fsS http://127.0.0.1:4000/api/health && exit 0; sleep 5; done; exit 1",
          ])

          Path("commands.json").write_text(json.dumps({"commands": commands}))
          PY

          COMMAND_ID="$(aws ssm send-command \
            --instance-ids "$INSTANCE_ID" \
            --document-name "AWS-RunShellScript" \
            --comment "Deploy healthcare backend from GitHub Actions" \
            --parameters file://commands.json \
            --query 'Command.CommandId' \
            --output text)"

          if ! aws ssm wait command-executed --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID"; then
            aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --output json
            exit 1
          fi

          aws ssm get-command-invocation --command-id "$COMMAND_ID" --instance-id "$INSTANCE_ID" --output json
