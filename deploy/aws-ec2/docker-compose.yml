services:
  backend:
    image: ${BACKEND_IMAGE}
    container_name: healthcare-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:4000/api/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
