global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: backend-aws
    metrics_path: /metrics
    static_configs:
      - targets:
          - host.docker.internal:4000

  - job_name: prometheus
    static_configs:
      - targets:
          - localhost:9090

  # Update this target when OCR metrics are reachable from the monitoring host.
  # Example:
  # - job_name: ocr-service
  #   metrics_path: /metrics
  #   static_configs:
  #     - targets:
  #         - 192.168.100.169:8001
