global:
  resolve_timeout: 5m
  smtp_smarthost: smtp.gmail.com:587
  smtp_from: CHANGE_ME_FROM@gmail.com
  smtp_auth_username: CHANGE_ME_FROM@gmail.com
  smtp_auth_password: CHANGE_ME_APP_PASSWORD
  smtp_require_tls: true

route:
  receiver: default-email
  group_by: ['alertname', 'service']
  group_wait: 30s
  group_interval: 5m
  repeat_interval: 2h

receivers:
  - name: default-email
    email_configs:
      - to: CHANGE_ME_TO@gmail.com
        send_resolved: true

