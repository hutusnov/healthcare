apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: uit-healthcare-private-ocr
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/hutusnov/healthcare.git
    targetRevision: main
    path: deploy/gitops/apps/private-ocr/overlays/prod
  destination:
    server: https://kubernetes.default.svc
    namespace: uit-healthcare-private
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
