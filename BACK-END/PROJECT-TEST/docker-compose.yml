# docker-compose.yml — Local Development Stack
version: '3.8'

services:
  # PostgreSQL Database
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: project_test
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Backend API
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgresql://postgres:postgres@db:5432/project_test
      JWT_SECRET: dev_secret_change_in_production_32chars_min
      JWT_EXPIRES: 7d
      FRONTEND_URL: http://localhost:5173
      ADMIN_PANEL_URL: http://localhost:5173
      PATIENT_PORTAL_URL: http://localhost:5174
    depends_on:
      db:
        condition: service_healthy

  # Python OCR Microservice
  ocr:
    build:
      context: ../OCR
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      OCR_AUTH_ENABLED: "true"
      OCR_API_KEY: dev_ocr_key_change_in_production
      OCR_MAX_FILE_SIZE_MB: "10"
      OCR_ENV: development

volumes:
  pgdata:
