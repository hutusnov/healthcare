apiVersion: v1
kind: Namespace
metadata:
  name: uit-healthcare
---
# ============================
# Backend API — Deployment
# ============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend-api
  namespace: uit-healthcare
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend-api
  template:
    metadata:
      labels:
        app: backend-api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "4000"
        prometheus.io/path: "/metrics"
    spec:
      nodeSelector:
        kubernetes.io/hostname: ai-ocr-worker
      containers:
        - name: api
          image: ghcr.io/hutusnov/healthcare-backend:develop-latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 4000
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4000"
            # Data layer runs outside K3s on data-core-node.
            # Create backend-secret.database-url with a value like:
            # <database-url>
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: database-url
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: jwt-secret
            - name: MOMO_PARTNER_CODE
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: momo-partner-code
            - name: MOMO_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: momo-access-key
            - name: MOMO_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: momo-secret-key
            - name: MOMO_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: momo-endpoint
            - name: MOMO_RETURN_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: momo-return-url
            - name: MOMO_NOTIFY_URL
              valueFrom:
                secretKeyRef:
                  name: backend-secret
                  key: momo-notify-url
          readinessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
---
apiVersion: v1
kind: Service
metadata:
  name: backend-api
  namespace: uit-healthcare
spec:
  type: ClusterIP
  ports:
    - port: 4000
      targetPort: 4000
  selector:
    app: backend-api

---
# ============================
# OCR Service — Deployment
# ============================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ocr-service
  namespace: uit-healthcare
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ocr-service
  template:
    metadata:
      labels:
        app: ocr-service
    spec:
      nodeSelector:
        workload-role: ocr
      containers:
        - name: ocr
          image: ghcr.io/hutusnov/healthcare-ocr:develop-latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
          ports:
            - containerPort: 8001
          env:
            - name: OCR_AUTH_ENABLED
              value: "true"
            - name: OCR_API_KEY
              valueFrom:
                secretKeyRef:
                  name: ocr-secret
                  key: api-key
            - name: OCR_ENV
              value: production
          readinessProbe:
            httpGet:
              path: /health
              port: 8001
            initialDelaySeconds: 30
            periodSeconds: 15
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
---
apiVersion: v1
kind: Service
metadata:
  name: ocr-service
  namespace: uit-healthcare
spec:
  type: ClusterIP
  ports:
    - port: 8001
      targetPort: 8001
  selector:
    app: ocr-service

---
# ============================
# Ingress — NGINX Ingress Controller
# ============================
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: main-ingress
  namespace: uit-healthcare
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
    cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - api.hutus.id.vn
      secretName: tls-secret
  rules:
    - host: api.hutus.id.vn
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-api
                port:
                  number: 4000
          - path: /metrics
            pathType: Prefix
            backend:
              service:
                name: backend-api
                port:
                  number: 4000
